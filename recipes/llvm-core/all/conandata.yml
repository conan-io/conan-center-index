patches:
  "21.1.8":
    - patch_file: patches/21x/0000-zlib-conan.patch
      patch_description: fix references to third party libs to match conan variables and targets
      patch_type: conan
      base_path: llvm-main
    - patch_file: patches/21x/0001-trycompile-targets.patch
      patch_description: use target names instead of legacy variables in trycompile
      patch_type: portability
      patch_source: https://github.com/llvm/llvm-project/pull/185463
      base_path: llvm-main
