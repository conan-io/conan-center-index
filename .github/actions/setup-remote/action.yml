inputs:
  artifactory-url:
    description: 'Url of Artifactory instance'
    required: false
  artifactory-token:
    description: 'Password to authenticate with Artifactory'
    required: false
  artifactory-user:
    description: 'User to authenticate with Artifactory'
    required: false
name: 'Setup Conan'
runs:
  using: "composite"
  steps:
    - run: |
        conan remote add community ${CONAN_ARTIFACTORY_URL}
        conan remote auth community --format=json | jq ".community | has(\"error\")" | grep -q "false"
      env:
        CONAN_LOGIN_USERNAME_COMMUNITY: ${{ inputs.artifactory-user }}
        CONAN_PASSWORD_COMMUNITY: ${{ inputs.artifactory-token }}
        CONAN_ARTIFACTORY_URL: ${{ inputs.artifactory-url }}
      shell: bash
